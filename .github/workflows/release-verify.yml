name: Release Verify

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-verify-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONPATH: skills/spicetify/scripts
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  SPICETIFY_AGENT_ALLOW_FAKE_BIN: "1"
  SPICETIFY_AGENT_ALLOW_REAL_SPICETIFY: "0"

jobs:
  verify-release:
    name: Verify release target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.2 --activate
          pnpm --version

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = f"v{version}"
          actual = os.environ["RELEASE_REF"]
          if actual != expected:
              raise SystemExit(f"release ref {actual!r} does not match package version {version!r}")
          print(f"release ref ok: {actual}")
          PY

      - name: Validate generated artifacts and bundle
        run: |
          python3 tools/generate_schema_data.py --root . --check
          python3 tools/generate_docs_references.py --root . --check
          python3 tools/validate_bundle.py --root .
          python3 tools/validate_openspec_structure.py --root .

      - name: Run Python quality gates
        run: |
          uv run --frozen pytest
          uv run --frozen ruff format --check .
          uv run --frozen ruff check .
          uv run --frozen ty check skills/spicetify/scripts tools tests

      - name: Run deterministic skill evals
        run: |
          python3 tools/run_skill_evals.py --suite evals/spicetify-eval-suite.json --strict --execute-fake --json
          python3 tools/run_skill_evals.py --suite evals/spicetify-routing-eval-suite.json --strict --json
          python3 tools/run_skill_evals.py --suite evals/spicetify-research-eval-suite.json --strict --json

      - name: Validate docs
        run: |
          pnpm --filter docs lint
          pnpm --filter docs typecheck
          pnpm --filter docs validate:content
          pnpm --filter docs build

      - name: Verify package and helper CLI
        run: |
          uv build
          uvx --from . spicetify-agent validate-schemas
          uvx --from . spicetify-agent --help

      - name: Verify pinned skill install path
        run: npx --yes skills add "github:${{ github.repository }}@${RELEASE_REF}" --skill spicetify --list

      - name: Validate OpenSpec with CLI
        run: |
          npx --yes --package @fission-ai/openspec@1.4.1 openspec validate add-spicetify-skill --strict
          npx --yes --package @fission-ai/openspec@1.4.1 openspec validate --all --strict
